name: Build and Deploy
on: [push]
permissions:
  contents: write   # 仅当使用 GITHUB_TOKEN 时需要

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20   # 升级到 LTS 版本
          #cache: 'pnpm'      # 使用内置 pnpm 缓存

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          
      - name: Add pnpm to PATH (fallback)
        run: echo "$HOME/.local/share/pnpm" >> $GITHUB_PATH
  
      - name: Verify pnpm installation
        run: |
            pnpm --version
            which pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}   # 或使用 ACCESS_TOKEN 若需要
          publish_dir: ./dist
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          allow_empty_commit: false